<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Propositions Teasers – Les Sons du Lac 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
/* ── Reset & base ───────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body,#root{width:100%;height:100%;overflow:hidden;position:fixed}
body{font-family:'DM Sans',system-ui,sans-serif;background:#0d0e1f;-webkit-font-smoothing:antialiased;color:#ede8ff}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:rgba(182,143,167,.25);border-radius:2px}

/* ── Responsive Grid System ────────────────────────────── */
.responsive-grid {
    display: grid;
    gap: 14px;
    padding: 14px 24px 80px;
    flex: 1;
    overflow-y: auto;
    width: 100%;
}

@media (min-width: 1024px) {
    .grid-2 { grid-template-columns: 1fr 1fr; }
    .grid-4 { grid-template-columns: repeat(4, 1fr); }
}

@media (max-width: 1023px) {
    .grid-2, .grid-4 { grid-template-columns: 1fr; }
    .responsive-grid { padding: 10px 15px 100px; gap: 20px; }
    .nav-pill { bottom: 10px !important; scale: 0.9; }
    .logo { display: none; } /* On cache le logo fixe sur mobile pour gagner de la place */
}

/* ── Keyframes ──────────────────────────────────────────── */
@keyframes morphReveal{
  from{clip-path:circle(0% at var(--cx,50%) var(--cy,50%))}
  to   {clip-path:circle(200% at var(--cx,50%) var(--cy,50%))}
}
@keyframes fadeUp{
  from{opacity:0;transform:translateY(16px) scale(.975)}
  to   {opacity:1;transform:none}
}
@keyframes blobDrift{
  0%,100%{border-radius:62% 38% 46% 54%/60% 44% 56% 40%}
  33%     {border-radius:38% 62% 60% 40%/40% 58% 42% 60%}
  66%     {border-radius:54% 46% 38% 62%/50% 36% 64% 50%}
}
@keyframes tabIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* ── Slide system ───────────────────────────────────────── */
.deck{width:100vw;height:100vh;position:relative;overflow:hidden}
.slide{position:absolute;inset:0;background:#0d0e1f;display:flex;flex-direction:column}
.slide-morph{animation:morphReveal .7s cubic-bezier(.4,0,.2,1) both}

.stagger>*{animation:fadeUp .5s ease both;opacity:0}
.stagger>*:nth-child(1){animation-delay:.07s}
.stagger>*:nth-child(2){animation-delay:.15s}
.stagger>*:nth-child(3){animation-delay:.23s}

.blob{position:absolute;pointer-events:none;animation:blobDrift 14s ease-in-out infinite;
  filter:blur(72px);mix-blend-mode:screen;will-change:transform;
  transition:transform 1s cubic-bezier(.25,.46,.45,.94)}

.grain::after{content:'';position:absolute;inset:-50%;width:200%;height:200%;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.042'/%3E%3C/svg%3E");
  pointer-events:none;opacity:.55;z-index:1}

.card{background:rgba(47,49,99,.38);border:1px solid rgba(182,143,167,.13);
  border-radius:10px;backdrop-filter:blur(14px);overflow:hidden}

/* ── UI Elements ────────────────────────────────────────── */
.badge,.tag{display:inline-flex;align-items:center;border-radius:999px}
.badge{padding:4px 12px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.4px;white-space:nowrap}
.tag{padding:4px 11px;font-family:'DM Sans',sans-serif;font-size:10px;font-weight:500}

.tab-list{display:grid;grid-template-columns:1fr 1fr;background:rgba(13,14,31,.82);border:1px solid rgba(182,143,167,.15);border-radius:7px;padding:3px;gap:2px}
.tab-btn{display:flex;align-items:center;justify-content:center;gap:5px;padding:8px;border-radius:5px;border:none;cursor:pointer;background:transparent;color:#8b82b8;font-size:10px;transition:all .2s}
.tab-btn.on-impact{background:#ef834f;color:#111;font-weight:600}
.tab-btn.on-prestige{background:#d06574;color:#fff;font-weight:600}

.ctable{width:100%;border-collapse:separate;border-spacing:0;min-width:600px}
.table-wrapper{overflow-x:auto;width:100%;background:rgba(0,0,0,0.2);border-radius:10px}

.nav-pill{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:10px;background:rgba(13,14,31,.84);backdrop-filter:blur(20px);border:1px solid rgba(182,143,167,.16);border-radius:40px;padding:7px 16px;z-index:400}
.nav-btn{width:36px;height:36px;border-radius:50%;border:none;cursor:pointer;background:rgba(47,49,99,.7);color:#ede8ff;display:flex;align-items:center;justify-content:center;transition:all .2s;font-size:20px}
.nav-dot{width:6px;height:6px;border-radius:50%;background:rgba(182,143,167,.22);cursor:pointer}

.shdr{padding:15px 24px;flex-shrink:0;background:rgba(13,14,31,.72);backdrop-filter:blur(10px);border-bottom:1px solid rgba(182,143,167,.12)}
.shdr-t{font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(14px, 4vw, 18px);color:#ede8ff;text-transform:uppercase}

.logo{position:fixed;top:14px;right:18px;z-index:400;font-family:'DM Mono',monospace;font-size:9px;color:rgba(182,143,167,.3);text-align:right}

@media (max-width: 600px) {
  .stagger { padding: 0 24px 60px !important; }
  .intro-info-card { position: relative !important; right: auto !important; top: auto !important; transform: none !important; margin: 20px 0 !important; width: 100% !important; }
  .close-grid { grid-template-columns: 1fr !important; }
  .close-left { padding: 40px 24px !important; }
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback,Fragment}=React;

const T={
  deep:'#0d0e1f',navy:'#2f3163',mauve:'#b68fa7',pink:'#a1536b',
  rose:'#d06574',orange:'#ef834f',yellow:'#f8ec64',text:'#ede8ff',
  sub:'#8b82b8',border:'rgba(182,143,167,.13)',glass:'rgba(13,14,31,.72)',
};

/* ── SVG icons ───────────────────────────────────────────── */
const Icon={
  grid:<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>,
  box:<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>,
  clock:<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>,
  cam:<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>,
  arr:<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>,
  pin:<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>,
  film:<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="2" y="2" width="20" height="20" rx="2.18"/><line x1="7" y1="2" x2="7" y2="22"/><line x1="17" y1="2" x2="17" y2="22"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="2" y1="7" x2="7" y2="7"/><line x1="2" y1="17" x2="7" y2="17"/><line x1="17" y1="17" x2="22" y2="17"/><line x1="17" y1="7" x2="22" y2="7"/></svg>,
  clap:<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M20.24 12.24a6 6 0 0 0-8.49-8.49L5 10.5V19h8.5z"/><line x1="16" y1="8" x2="2" y2="22"/><line x1="17.5" y1="15" x2="9" y2="15"/></svg>,
};

/* ── Scene data ─────────────────────────────────────────── */
const mk=(p,n)=>({img2d:`assets/scenes/${p}_s${n}_2d.png`,img3d:`assets/scenes/${p}_s${n}_3d.png`});
const S1=[
  {n:1,tc:'00:00–00:05',title:'ACCROCHE',desc:'Main pose violemment une carte du lac sur une table. Poussière en suspension.',mat:'Sigma 17-50 · 35mm · f/2.8',...mk('short1',1)},
  {n:2,tc:'00:05–00:12',title:'RÉVÉLATION 3D',desc:'Le lac sort de la carte en 3D. Caméra plonge, révélant le plan du site.',mat:'Scan 3D + Mouvement physique',...mk('short1',2)},
  {n:3,tc:'00:12–00:25',title:'MONTAGE ÉD. 1',desc:'Cuts ultra-rapides sur les meilleurs plans 2025 : drone, scène, public.',mat:'Drone + Caméra sol',...mk('short1',3)},
  {n:4,tc:'00:25–00:30',title:'RÉVÉLATION DATE',desc:'Retour bibliothèque. Homme réapparaît, doigt sur les lèvres. 27 juin 2026.',mat:'Sigma 17-50 · Dézoom',...mk('short1',4)},
];
const S2=[
  {n:1,tc:'00:00–00:20',title:'LE TABLEAU PREND VIE',desc:'Travelling vers un cadre du lac qui prend vie — plan du site 2026.',mat:'Sigma 17-50 · 35mm',...mk('short2',1)},
  {n:2,tc:'00:20–00:30',title:'RETOUR À LA RÉALITÉ',desc:'La main attrape l\'objectif pour ramener la scène dans la pièce.',mat:'Sigma 10-20 · 10mm',...mk('short2',2)},
];
const LG=[
  {n:1,tc:'00:00–00:15',title:'ÉLÉMENT DÉCLENCHEUR',desc:'Membre du bureau sur son canapé. Notif : « L\'édition 1 me manque ».',mat:'Sigma 10-20 · Plan large',...mk('long',1)},
  {n:2,tc:'00:15–00:20',title:'LA CONVOCATION',desc:'Différents membres reçoivent chacun une notification. Plans resserrés.',mat:'Multi-lieux · f/2.8',...mk('long',2)},
  {n:3,tc:'00:20–00:50',title:'RÉUNION HOLOGRAPHIQUE',desc:'Membres autour d\'un billard. Hologramme 3D du lac. Discussion site.',mat:'BMPCC 4K + Sony A7III',...mk('long',3)},
  {n:4,tc:'00:50–01:00',title:'FINAL & RÉVÉLATION',desc:'Conclusion de réunion. Dates et lieu. Best-of 2025 en finish.',mat:'Plans 2025 divers',...mk('long',4)},
];

/* ── Components ─────────────────────────────────────────── */
function BG({mouse,tint}){
  return (
    <div className="grain" style={{position:'absolute',inset:0,overflow:'hidden',pointerEvents:'none',zIndex:0}}>
      <div className="blob" style={{width:400,height:400,top:'20%',left:'60%',background:tint||T.mauve,opacity:.1,transform:`translate(${mouse.x*20}px,${mouse.y*20}px)`}}/>
      <div className="blob" style={{width:300,height:300,top:'60%',left:'10%',background:T.orange,opacity:.08,transform:`translate(${mouse.x*10}px,${mouse.y*10}px)`}}/>
    </div>
  );
}

function SceneImg({src, type, accent}) {
  const [ok, setOk] = useState(false);
  const [err, setErr] = useState(false);
  return (
    <a href={src} target="_blank" rel="noopener noreferrer" 
       style={{ width: '100%', display: 'block', borderRadius: 6, overflow: 'hidden', cursor: 'zoom-in', background: 'rgba(0,0,0,0.3)' }}>
      {!err ? (
        <img src={src} alt="" onLoad={() => setOk(true)} onError={() => setErr(true)}
          style={{width: '100%', height: 'auto', display: 'block', opacity: ok ? 1 : 0, transition: 'opacity .4s'}}/>
      ) : null}
      {(!ok || err) && (
        <div style={{aspectRatio:'16/9', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', border:`1px dashed ${accent}44`}}>
          <span style={{color:accent, opacity:.5}}>{type==='2d'?Icon.grid:Icon.box}</span>
          <div style={{fontSize:8, color:T.sub, marginTop:4}}>{type==='2d'?'SCHÉMA 2D':'RENDU 3D'}</div>
        </div>
      )}
    </a>
  );
}

function SceneCard({s, variant}) {
  const [tab, setTab] = useState('2d');
  const ac = variant === 'impact' ? T.orange : T.rose;
  return (
    <div className="card" style={{display: 'flex', flexDirection: 'column', borderTop: `2px solid ${ac}`, minHeight: 'fit-content'}}>
      <div style={{padding: '10px', background: 'rgba(0,0,0,.2)', display:'flex', gap:10, alignItems:'center'}}>
        <div style={{width:24, height:24, borderRadius:5, background:ac, color:'#111', display:'flex', alignItems:'center', justifyContent:'center', fontWeight:800, fontSize:12}}>{s.n}</div>
        <div style={{flex:1}}>
            <div style={{fontSize:9, color:T.sub, display:'flex', alignItems:'center', gap:4}}>{Icon.clock}{s.tc}</div>
            <div style={{fontSize:11, fontWeight:700, color:ac, textTransform:'uppercase'}}>{s.title}</div>
        </div>
      </div>
      <div style={{padding: '10px'}}>
        <div className="tab-list">
          {['2d', '3d'].map(t => (
            <button key={t} className={`tab-btn${tab===t?` on-${variant}`:''}`} onClick={()=>setTab(t)}>
              {t==='2d'?Icon.grid:Icon.box} {t.toUpperCase()}
            </button>
          ))}
        </div>
        <div style={{marginTop:8}}>
          {tab==='2d' ? <SceneImg src={s.img2d} type="2d" accent={ac}/> : <SceneImg src={s.img3d} type="3d" accent={ac}/>}
        </div>
        <p style={{fontSize:11, marginTop:10, lineHeight:1.5, opacity:.9}}>{s.desc}</p>
        <div style={{marginTop:8, paddingTop:8, borderTop:`1px solid ${T.border}`, fontSize:9, color:T.sub, display:'flex', gap:5}}>
          <span style={{color:ac}}>{Icon.cam}</span>{s.mat}
        </div>
      </div>
    </div>
  );
}

function Slide_Title({mouse}){
  return (
    <div style={{flex:1, position:'relative', display:'flex', alignItems:'center', justifyContent:'center', textAlign:'center', overflow:'hidden'}}>
      <BG mouse={mouse} tint={T.rose}/>
      <div className="stagger" style={{position:'relative', zIndex:2, padding:'0 20px'}}>
        <span className="badge" style={{background:`${T.rose}22`, color:T.rose, border:`1px solid ${T.rose}55`}}>DOSSIER VIDÉO 2026</span>
        <h1 style={{fontFamily:"'Syne',sans-serif", fontWeight:800, fontSize:'clamp(40px, 10vw, 80px)', lineHeight:0.9, margin:'20px 0'}}>
          PROPOSITIONS<br/><span style={{color:T.orange}}>TEASERS</span>
        </h1>
        <p style={{fontSize:16, fontWeight:600}}>Les Sons du Lac — Édition 2</p>
        <p style={{fontSize:12, color:T.sub, marginTop:10}}>{Icon.pin} 27 Juin 2026 · Rabodanges</p>
      </div>
    </div>
  );
}

function Slide_PropIntro({num, title, desc, tags, info, accent, mouse}){
  return (
    <div style={{flex:1, position:'relative', display:'flex', flexDirection:'column', justifyContent:'center', overflowY:'auto'}}>
      <BG mouse={mouse} tint={accent}/>
      <div className="stagger" style={{padding:'40px 72px', maxWidth:900, width:'100%'}}>
        <span className="badge" style={{background:`${accent}22`, color:accent, border:`1px solid ${accent}44`}}>PROPOSITION {num}</span>
        <h2 style={{fontFamily:"'Syne',sans-serif", fontWeight:800, fontSize:'clamp(30px, 6vw, 60px)', color:T.text, margin:'15px 0'}}>{title}</h2>
        <p style={{fontSize:14, lineHeight:1.7, opacity:0.8, maxWidth:600}}>{desc}</p>
        <div style={{display:'flex', gap:8, flexWrap:'wrap', marginTop:20}}>
          {tags.map((t,i)=><span key={i} className="tag" style={{background:`${t.bg}22`, color:t.bg, border:`1px solid ${t.bg}44`}}>{t.label}</span>)}
        </div>
      </div>
      <div className="card intro-info-card" style={{position:'absolute', right:40, top:'50%', transform:'translateY(-50%)', width:200, padding:15, background:'rgba(10,10,25,0.8)'}}>
         <div style={{fontSize:10, fontWeight:800, color:accent, marginBottom:10}}>INFOS CLÉS</div>
         {info.map((text, i)=><div key={i} style={{fontSize:11, padding:'5px 0', borderBottom:i<info.length-1?`1px solid ${T.border}`:'none'}}>{text}</div>)}
      </div>
    </div>
  );
}

/* ── Main App ───────────────────────────────────────────── */
function App(){
  const [cur, setCur] = useState(0);
  const [nxt, setNxt] = useState(null);
  const [mouse, setMouse] = useState({x:0,y:0});
  const busy = useRef(false);

  const SLIDES=[
    {el: <Slide_Title mouse={mouse}/>, accent: T.rose},
    {el: <Fragment>
            <SHdr title="Reveal the Secret" sub="Format Impact · 30s · Vertical 9:16" accent={T.orange}/>
            <div className="responsive-grid grid-4">{S1.map(s=><SceneCard key={s.n} s={s} variant="impact"/>)}</div>
         </Fragment>, accent: T.orange},
    {el: <Fragment>
            <SHdr title="Le Tableau Vivant" sub="Format Impact · 30s · Vertical 9:16" accent={T.orange}/>
            <div className="responsive-grid grid-2">{S2.map(s=><SceneCard key={s.n} s={s} variant="impact"/>)}</div>
         </Fragment>, accent: T.orange},
    {el: <Slide_PropIntro num="03" title="L'APPEL DU PUBLIC" accent={T.rose} mouse={mouse} 
            desc="Un membre du bureau reçoit un message d'un fan. Il convoque les autres. Réunion autour d'un hologramme 3D pour préparer 2026."
            tags={[{label:'Cinématographique', bg:T.rose}, {label:'Narratif', bg:T.yellow}]}
            info={['1 min+','16:9','Château','BMPCC 4K']}/>, accent: T.rose},
    {el: <Fragment>
            <SHdr title="L'Appel du Public" sub="Format Prestige · 1 min+ · Horizontal 16:9" accent={T.rose}/>
            <div className="responsive-grid grid-2">{LG.map(s=><SceneCard key={s.n} s={s} variant="prestige"/>)}</div>
         </Fragment>, accent: T.rose},
    {el: <div style={{flex:1, display:'grid'}} className="close-grid">
            <div className="close-left" style={{padding:60, display:'flex', flexDirection:'column', justifyContent:'center', position:'relative', overflow:'hidden'}}>
               <BG mouse={mouse} tint={T.orange}/>
               <h2 style={{fontFamily:"'Syne',sans-serif", fontSize:50, fontWeight:800, lineHeight:1}}>ET<br/>MAINTENANT ?</h2>
               <div style={{width:50, height:3, background:T.orange, margin:'20px 0'}}/>
               <p style={{color:T.sub}}>Faisons vibrer Rabodanges le 27 Juin 2026.</p>
            </div>
            <div style={{background:'rgba(255,255,255,0.03)', padding:40, display:'flex', flexDirection:'column', justifyContent:'center'}}>
               <div style={{fontSize:12, fontWeight:800, color:T.rose, marginBottom:20}}>PROCHAINES ÉTAPES</div>
               {['Validation scénario', 'Repérage lieux', 'Casting bureau', 'Tournage 21 mars'].map((t,i)=>(
                 <div key={i} style={{display:'flex', gap:15, padding:'12px 0', borderBottom:`1px solid ${T.border}`}}>
                   <div style={{width:20, height:20, borderRadius:4, background:T.orange, color:'#000', fontSize:10, fontWeight:800, display:'flex', alignItems:'center', justifyContent:'center'}}>{i+1}</div>
                   <div style={{fontSize:13}}>{t}</div>
                 </div>
               ))}
            </div>
         </div>, accent: T.pink}
  ];

  const goTo = useCallback((idx)=>{
    if(busy.current || idx<0 || idx>=SLIDES.length) return;
    busy.current = true;
    setNxt(idx);
    setTimeout(()=>{ setCur(idx); setNxt(null); busy.current=false; }, 700);
  }, [SLIDES.length]);

  return (
    <div className="deck" onMouseMove={e=>setMouse({x:e.clientX/window.innerWidth-.5, y:e.clientY/window.innerHeight-.5})}>
      <div className="progress" style={{width:`${(cur/(SLIDES.length-1))*100}%`, background:SLIDES[cur].accent}}/>
      <div className="logo">LSDL<br/>2026</div>
      
      <div className="slide">{SLIDES[cur].el}</div>
      {nxt!==null && <div className="slide slide-morph" style={{'--cx':'50%','--cy':'50%', zIndex:100}}>{SLIDES[nxt].el}</div>}

      <div className="nav-pill">
        <button className="nav-btn" onClick={()=>goTo(cur-1)} disabled={cur===0}>‹</button>
        {SLIDES.map((_,i)=><div key={i} className="nav-dot" style={{background:i===cur?SLIDES[cur].accent:undefined, transform:i===cur?'scale(1.5)':'none'}} onClick={()=>goTo(i)}/>)}
        <button className="nav-btn" onClick={()=>goTo(cur+1)} disabled={cur===SLIDES.length-1}>›</button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
